<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="840" viewBox="0 0 1440 840" role="img" aria-labelledby="title desc">
  <title id="title">3D-RAMS hosted durable query-to-brief architecture flow</title>
  <desc id="desc">A hosted browser user starts an access-code session, sends a site visit request, the backend creates a durable run, confirms location evidence when needed, runs server-side Bedrock and allowlisted tools, then returns a 3D review pack with evidence, trace, safety, and AWS observability records.</desc>
  <defs>
    <style>
      .bg{fill:#f5f7f4}
      .band{fill:#ffffff;stroke:#d7e1dc;stroke-width:2}
      .browser{fill:#f7fbf9;stroke:#0b6f65;stroke-width:2}
      .runtime{fill:#eef6ff;stroke:#315c9b;stroke-width:2}
      .agent{fill:#eefaf6;stroke:#0b6f65;stroke-width:2}
      .data{fill:#fff8e7;stroke:#b7791f;stroke-width:2}
      .output{fill:#f7f8fa;stroke:#596873;stroke-width:2}
      .decision{fill:#ffffff;stroke:#8a5600;stroke-width:2}
      .label{font:700 18px Arial,sans-serif;fill:#15211d}
      .small{font:500 14px Arial,sans-serif;fill:#4f625c}
      .tiny{font:700 12px Arial,sans-serif;fill:#63746e;text-transform:uppercase}
      .arrow{stroke:#273549;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .thin{stroke:#4f625c;stroke-width:2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#7a8b85;stroke-width:2;stroke-dasharray:8 7;fill:none;marker-end:url(#arrow)}
      .note{font:700 13px Arial,sans-serif;fill:#33463f}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#273549"/>
    </marker>
  </defs>

  <rect class="bg" width="1440" height="840"/>
  <text class="tiny" x="52" y="48">3D-RAMS hosted V3 / durable-run path</text>
  <text class="label" x="52" y="78">Chat request to evidence-backed 3D pre-visit review pack</text>
  <text class="small" x="52" y="104">The browser never calls Bedrock or holds AWS credentials. Location evidence, tool calls, safety, state, and observability stay server-side.</text>

  <rect class="band" x="44" y="138" width="278" height="610" rx="18"/>
  <text class="tiny" x="68" y="170">Browser boundary</text>
  <rect class="browser" x="72" y="202" width="220" height="72" rx="12"/>
  <text class="label" x="96" y="232">Hosted UI</text>
  <text class="small" x="96" y="254">Amplify React app</text>
  <rect class="browser" x="72" y="310" width="220" height="82" rx="12"/>
  <text class="label" x="96" y="340">Access session</text>
  <text class="small" x="96" y="362">shared code + alias</text>
  <rect class="browser" x="72" y="428" width="220" height="84" rx="12"/>
  <text class="label" x="96" y="458">Chat + uploads</text>
  <text class="small" x="96" y="480">request, PDFs/images</text>
  <rect class="browser" x="72" y="604" width="220" height="86" rx="12"/>
  <text class="label" x="96" y="634">Visualizer panels</text>
  <text class="small" x="96" y="656">3D scene, risk cards</text>
  <text class="small" x="96" y="676">evidence, trace, safety</text>

  <rect class="band" x="362" y="138" width="292" height="610" rx="18"/>
  <text class="tiny" x="386" y="170">API + durable run boundary</text>
  <rect class="runtime" x="392" y="202" width="232" height="72" rx="12"/>
  <text class="label" x="418" y="232">API Gateway</text>
  <text class="small" x="418" y="254">HTTP API + CORS</text>
  <rect class="runtime" x="392" y="310" width="232" height="82" rx="12"/>
  <text class="label" x="418" y="340">Lambda FastAPI</text>
  <text class="small" x="418" y="362">validates access</text>
  <rect class="runtime" x="392" y="428" width="232" height="84" rx="12"/>
  <text class="label" x="418" y="458">Durable run API</text>
  <text class="small" x="418" y="480">create, poll, cancel</text>
  <rect class="runtime" x="392" y="604" width="232" height="86" rx="12"/>
  <text class="label" x="418" y="634">Run status</text>
  <text class="small" x="418" y="656">partial/final UI state</text>
  <text class="small" x="418" y="676">checkpoints + result</text>

  <rect class="band" x="694" y="138" width="368" height="610" rx="18"/>
  <text class="tiny" x="718" y="170">Agent control boundary</text>
  <rect class="agent" x="724" y="202" width="282" height="72" rx="12"/>
  <text class="label" x="750" y="232">Intent + safety parser</text>
  <text class="small" x="750" y="254">site, activity, unsafe claims</text>
  <polygon class="decision" points="866,310 1016,365 866,420 716,365"/>
  <text class="label" x="776" y="358">Location evidence</text>
  <text class="small" x="818" y="382">trusted?</text>
  <rect class="data" x="724" y="462" width="282" height="72" rx="12"/>
  <text class="label" x="750" y="492">Confirm location</text>
  <text class="small" x="750" y="514">candidate card before tools</text>
  <rect class="agent" x="724" y="576" width="282" height="92" rx="12"/>
  <text class="label" x="750" y="606">Allowlisted tools</text>
  <text class="small" x="750" y="628">location, context, map</text>
  <text class="small" x="750" y="648">risk, briefing, safety</text>

  <rect class="band" x="1102" y="138" width="292" height="610" rx="18"/>
  <text class="tiny" x="1126" y="170">Server-side AWS services</text>
  <rect class="runtime" x="1132" y="202" width="232" height="72" rx="12"/>
  <text class="label" x="1158" y="232">Amazon Bedrock</text>
  <text class="small" x="1158" y="254">planner + synthesis</text>
  <rect class="data" x="1132" y="310" width="232" height="72" rx="12"/>
  <text class="label" x="1158" y="340">S3 evidence</text>
  <text class="small" x="1158" y="362">upload metadata/presign</text>
  <rect class="data" x="1132" y="418" width="232" height="72" rx="12"/>
  <text class="label" x="1158" y="448">DynamoDB</text>
  <text class="small" x="1158" y="470">session/run trace</text>
  <rect class="data" x="1132" y="526" width="232" height="72" rx="12"/>
  <text class="label" x="1158" y="556">CloudWatch</text>
  <text class="small" x="1158" y="578">logs, latency, fallback</text>
  <rect class="output" x="1132" y="634" width="232" height="72" rx="12"/>
  <text class="label" x="1158" y="664">Future controls</text>
  <text class="small" x="1158" y="686">Guardrails, WAF, HITL</text>

  <path class="arrow" d="M292 238 H392"/>
  <text class="note" x="310" y="228">GET app</text>
  <path class="arrow" d="M292 350 H392"/>
  <text class="note" x="306" y="336">session start</text>
  <path class="arrow" d="M292 470 H392"/>
  <text class="note" x="330" y="456">create run</text>
  <path class="arrow" d="M508 274 V310"/>
  <path class="arrow" d="M508 392 V428"/>
  <path class="arrow" d="M624 470 H724"/>
  <path class="arrow" d="M865 274 V310"/>
  <path class="arrow" d="M866 420 V462"/>
  <text class="note" x="912" y="446">needs confirmation</text>
  <path class="thin" d="M724 498 C646 498 642 470 624 470"/>
  <text class="note" x="630" y="536">frontend confirms candidate</text>
  <path class="arrow" d="M866 534 V576"/>
  <text class="note" x="782" y="558">confirmed</text>
  <path class="arrow" d="M1016 365 H1040 V622 H1006"/>
  <text class="note" x="1030" y="510">trusted coordinate</text>
  <path class="dash" d="M1006 238 H1132"/>
  <text class="note" x="1030" y="224">server-side model call</text>
  <path class="dash" d="M1006 612 C1060 612 1068 346 1132 346"/>
  <path class="dash" d="M1006 622 C1060 622 1068 454 1132 454"/>
  <path class="dash" d="M1006 632 C1060 632 1068 562 1132 562"/>
  <path class="arrow" d="M724 622 H624"/>
  <text class="note" x="632" y="612">partial/final UI state</text>
  <path class="arrow" d="M392 648 H292"/>
  <text class="note" x="320" y="638">poll + render</text>
  <path class="dash" d="M1006 622 C1086 708 1110 680 1132 670"/>
  <text class="note" x="1030" y="714">future safety layer</text>

  <rect class="output" x="62" y="768" width="1316" height="38" rx="10"/>
  <text class="small" x="84" y="792">Output is a review pack for human judgement: source-labelled evidence, confidence, trace, fallback notes, safety boundary, and 3D annotations. It is not certified RAMS or work approval.</text>
</svg>
